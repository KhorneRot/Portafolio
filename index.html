<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portafolio | Alejandro Ramírez</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #080808;
        color: #f7f7f2;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .loading {
        opacity: .78;
        text-align: center;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div class="loading">Cargando portafolio...</div>
    <script>
      (async () => {
        try {
          const response = await fetch('./treecatdesign/index.html', { cache: 'no-store' });
          let html = await response.text();
          html = html.replace('<head>', '<head>\n  <base href="./treecatdesign/">');
          html = html.replace('</head>', '  <link rel="stylesheet" href="./css/responsive-fixes.css" />\n</head>');
          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          window.location.replace('./treecatdesign/');
        }
      })();
    </script>
  </body>
</html>
