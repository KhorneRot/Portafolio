<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Portafolio | Alejandro Ramírez</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #080808;
        color: #f7f7f2;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .loading {
        opacity: .78;
        text-align: center;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div class="loading">Cargando portafolio...</div>
    <script>
      (async () => {
        const version = "mobile-fix-5";
        const withVersion = (path) => `${path}${path.includes("?") ? "&" : "?"}v=${version}`;

        try {
          const response = await fetch(withVersion("./treecatdesign/index.html"), { cache: "no-store" });

          if (!response.ok) {
            throw new Error(`No se pudo cargar el portafolio: ${response.status}`);
          }

          let html = await response.text();

          if (!/<base\s/i.test(html)) {
            html = html.replace(/<head>/i, '<head>\n  <base href="./treecatdesign/">');
          }

          html = html.replace(
            /<meta\s+name=["']viewport["'][^>]*>/i,
            '<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />'
          );

          html = html.replace(
            /<link\s+rel=["']stylesheet["']\s+href=["']\.\/css\/styles\.css["']\s*\/?>/i,
            `<link rel="stylesheet" href="${withVersion("./css/styles.css")}" />`
          );

          html = html.replace(
            /<\/head>/i,
            `  <link rel="stylesheet" href="${withVersion("./css/responsive-fixes.css")}" />\n</head>`
          );

          html = html.replace(
            /<script\s+src=["']\.\/js\/main\.js["']\s+defer><\/script>/i,
            `<script src="${withVersion("./js/main.js")}" defer><\/script>`
          );

          document.open();
          document.write(html);
          document.close();
        } catch (error) {
          window.location.replace("./treecatdesign/");
        }
      })();
    </script>
  </body>
</html>
